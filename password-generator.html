<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - Donezo</title>
  <meta name="description" content="Generate secure passwords locally in your browser.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-logo">Donezo</a>
      <button class="hamburger" id="hamburger">☰</button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html" class="nav-link">Dashboard</a></li>
        <li><a href="productivity.html" class="nav-link">Productivity</a></li>
        <li><a href="tools.html" class="nav-link">Tools</a></li>
      </ul>
    </div>
  </nav>

  <main class="container main-content">
    <div class="text-center mb-2">
      <h1 class="section-title" style="justify-content: center;">🔑 Secure Password Generator</h1>
      <p class="text-muted">Create strong, customized passwords in seconds.</p>
    </div>

    <div class="tool-wrapper" id="password-tool">
      
      <div class="form-group">
        <label class="form-label" style="display: flex; justify-content: space-between;">
          Password Length 
          <span id="length-val" style="color: var(--primary); font-weight: 800;">16</span>
        </label>
        <input type="range" id="pass-length" class="form-control" min="8" max="64" value="16" style="padding: 0;">
      </div>

      <div class="pass-options">
        <label class="pass-option-label">
          <input type="checkbox" id="inc-upper" checked> Uppercase (A-Z)
        </label>
        <label class="pass-option-label">
          <input type="checkbox" id="inc-lower" checked> Lowercase (a-z)
        </label>
        <label class="pass-option-label">
          <input type="checkbox" id="inc-num" checked> Numbers (0-9)
        </label>
        <label class="pass-option-label">
          <input type="checkbox" id="inc-sym" checked> Symbols (!@#$%)
        </label>
      </div>

      <div class="text-center mb-2">
        <button id="generate-btn" class="btn" style="width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem;">Generate Password 🔄</button>
      </div>

      <div class="password-output-group">
        <input type="text" id="pass-output" class="form-control" readonly placeholder="Click generate...">
        <button id="copy-btn" class="btn btn-secondary">Copy</button>
      </div>

    </div>

    <!-- In-Content Ad Placeholder -->
    <div class="ad-container mid-ad">In-Content Ad Space</div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">Donezo</div>
        <ul class="footer-nav">
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Privacy Policy</a></li>
        </ul>
      </div>
      <div class="footer-bottom">
        &copy; 2026 Donezo. All rights reserved. Built for students.
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
